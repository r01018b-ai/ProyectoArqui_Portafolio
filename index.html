<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio Personal · Jazmine Zuleta</title>
  <meta name="description" content="Portafolio personal de Jazmine Zuleta González, estudiante de Ingeniería de Sistemas y Computación. Cursos, proyectos y trayectoria académica." />
  <link rel="stylesheet" href="recursos/css/estilos.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a class="nav-logo" href="index.html">
      <div class="logo-icon">🌸</div>
      <span>Jazmine JZ</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a class="nav-link" href="index.html" data-page="inicio">Inicio</a></li>
      <li><a class="nav-link" href="vistas/sobreMi.html" data-page="sobreMi">Sobre mí</a></li>
      <li><a class="nav-link" href="vistas/cursos.html" data-page="cursos">Portafolio</a></li>
      <li><a class="nav-link" href="vistas/contacto.html" data-page="contacto">Contacto</a></li>
    </ul>
    <div class="nav-actions" id="navActions">
      <button class="btn-theme" onclick="TEMA.toggle()" title="Cambiar tema">🌙</button>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="inicio">
  <div class="hero-container">
    <div class="hero-text">
      <div class="hero-badge">✨ Portafolio Académico 2026</div>
      <h1 class="hero-title">
        Hola, soy<br>
        <span class="hl" id="heroNombre">Jazmine Zuleta</span>
      </h1>
      <p class="hero-subtitle" id="heroTitulo">Estudiante de Ingeniería de Sistemas y Computación</p>
      <p class="hero-desc" id="heroBio"></p>
      <div class="hero-btns">
        <a href="vistas/sobreMi.html" class="btn btn-primary btn-lg">Conóceme más 💜</a>
        <a href="vistas/cursos.html" class="btn btn-secondary btn-lg">Ver portafolio</a>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><span class="sn">5</span><span class="sl">Cursos</span></div>
        <div class="hero-stat"><span class="sn">16</span><span class="sl">Sem./Curso</span></div>
        <div class="hero-stat"><span class="sn" id="statArchivos">0</span><span class="sl">Archivos</span></div>
      </div>
    </div>

    <div class="hero-img-wrap">
      <div class="hero-frame">
        <div class="hero-photo" id="heroPhoto">🌸</div>
      </div>
    </div>
  </div>
</section>

<!-- SCRIPTS -->
<script src="datos/datosApp.js"></script>
<script src="recursos/js/app.js"></script>
<script src="recursos/js/visor.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  if (typeof initNav === "function") initNav('inicio');
  if (typeof initFadeIn === "function") initFadeIn();

  if (typeof DB === "undefined") return;

  const p = DB.getPerfil();

  const nombre = p.nombreCompleto ||
    [p.nombre, p.apellido].filter(Boolean).join(' ') ||
    'Jazmine Zuleta';

  const heroNombre = document.getElementById('heroNombre');
  if (heroNombre) heroNombre.textContent = nombre;

  const heroTitulo = document.getElementById('heroTitulo');
  if (heroTitulo) heroTitulo.textContent = p.titulo || '';

  const heroBio = document.getElementById('heroBio');
  if (heroBio) heroBio.textContent = p.bio || '';

  if (p.fotoUrl) {
    const ph = document.getElementById('heroPhoto');
    if (ph) {
      ph.innerHTML = `<img src="${p.fotoUrl}" alt="${nombre}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r-l)">`;
    }
  }

  const stats = DB.getStats();
  const sA = document.getElementById('statArchivos');
  if (sA) sA.textContent = stats.archivos || 0;

  const spEl = document.getElementById('skillsPreview');
  if (spEl && p.skills) {
    const skills = p.skills.slice(0, 4);
    spEl.innerHTML = skills.map(s => `
      <div class="skill-item">
        <div class="skill-head">
          <span>${s.nombre}</span>
          <span>${s.nivel}%</span>
        </div>
        <div class="skill-bar">
          <div class="skill-fill" style="width:${s.nivel}%"></div>
        </div>
      </div>
    `).join('');

    if (skills.length && typeof animateSkills === "function") {
      animateSkills();
    }
  }

});
</script>

</body>
</html>
